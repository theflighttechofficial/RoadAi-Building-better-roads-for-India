<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Health Monitor — Chennai</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>

  <!-- Leaflet plugins -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1f2433;
      --muted:     #3a3f52;
      --text:      #e8eaf2;
      --dim:       #7c8299;

      --good:      #00e5a0;
      --moderate:  #ffb020;
      --poor:      #ff3d5a;

      --good-dim:      rgba(0,229,160,0.12);
      --moderate-dim:  rgba(255,176,32,0.12);
      --poor-dim:      rgba(255,61,90,0.12);

      --font-display: 'Syne', sans-serif;
      --font-mono:    'Space Mono', monospace;
    }

    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-display); overflow: hidden; }

    /* ── Layout ───────────────────────────────────────────────── */
    #shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    #topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 900;
    }

    #topbar .logo {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text);
    }

    #topbar .logo span { color: var(--good); }

    #topbar .pill {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--dim);
      letter-spacing: .06em;
    }

    #topbar .spacer { flex: 1; }

    #pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 8px var(--good);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.7); }
    }

    #topbar .live-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--good);
      letter-spacing: .1em;
    }

    #time-display {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--dim);
    }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 800;
    }

    /* Stats strip */
    #stats-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      padding: 14px 12px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-card:last-child { border-right: none; }

    .stat-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.good::before    { background: var(--good); }
    .stat-card.moderate::before { background: var(--moderate); }
    .stat-card.poor::before    { background: var(--poor); }

    .stat-count {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card.good     .stat-count { color: var(--good); }
    .stat-card.moderate .stat-count { color: var(--moderate); }
    .stat-card.poor     .stat-count { color: var(--poor); }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* Score gauge */
    #score-block {
      padding: 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #gauge-wrap { position: relative; width: 70px; height: 70px; flex-shrink: 0; }

    #gauge-svg { transform: rotate(-90deg); }

    #gauge-track { fill: none; stroke: var(--border); stroke-width: 6; }

    #gauge-fill {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), stroke .4s;
    }

    #gauge-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      font-family: var(--font-mono);
    }

    #score-meta .score-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 4px;
    }

    #score-meta .score-desc {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
    }

    /* Filter section */
    #filter-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--dim);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #filter-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .05em;
      transition: all .2s;
    }

    .filter-btn:hover  { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { color: var(--bg); border-color: transparent; }
    .filter-btn.all.active    { background: var(--text); color: var(--bg); }
    .filter-btn.good.active   { background: var(--good);     border-color: var(--good); }
    .filter-btn.moderate.active { background: var(--moderate); border-color: var(--moderate); }
    .filter-btn.poor.active   { background: var(--poor);     border-color: var(--poor); }

    /* Layer toggles */
    #layer-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-row:last-child { margin-bottom: 0; }

    .toggle-label {
      font-size: 12px;
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background .2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--dim);
      transition: transform .2s, background .2s;
    }

    .toggle input:checked + .toggle-track { background: rgba(0,229,160,.3); }
    .toggle input:checked + .toggle-track + .toggle-thumb {
      transform: translateX(16px);
      background: var(--good);
    }

    /* Segment list */
    #list-section {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    #list-section::-webkit-scrollbar { width: 4px; }
    #list-section::-webkit-scrollbar-track { background: transparent; }
    #list-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-header {
      padding: 12px 16px 8px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
    }

    .segment-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .15s;
    }

    .segment-item:hover { background: rgba(255,255,255,.03); }
    .segment-item.active { background: rgba(255,255,255,.05); }

    .seg-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .seg-info { flex: 1; min-width: 0; }

    .seg-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seg-addr {
      font-size: 10px;
      color: var(--dim);
      font-family: var(--font-mono);
      margin-top: 1px;
    }

    .seg-score {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Map area ─────────────────────────────────────────────── */
    #map-wrap {
      position: relative;
      overflow: hidden;
    }

    #map { width: 100%; height: 100%; }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.6) !important;
      font-family: var(--font-display) !important;
      padding: 0 !important;
    }

    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }

    .popup-card { padding: 14px 16px; min-width: 200px; }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .popup-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .popup-name { font-size: 13px; font-weight: 700; }

    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .popup-row:last-child { margin-bottom: 0; }

    .popup-row .key { color: var(--dim); font-family: var(--font-mono); font-size: 10px; }

    .popup-row .val { font-weight: 600; font-family: var(--font-mono); }

    .score-bar-wrap {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .score-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s;
    }

    /* No-results message */
    #no-results {
      display: none;
      padding: 20px 16px;
      font-size: 12px;
      color: var(--dim);
      font-family: var(--font-mono);
      text-align: center;
    }

    /* Map overlay info */
    #map-corner {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 700;
      background: rgba(13,15,20,.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      line-height: 1.8;
      pointer-events: none;
    }

    #map-corner strong { color: var(--text); }

    /* Leaflet attribution dark override */
    .leaflet-control-attribution {
      background: rgba(13,15,20,.7) !important;
      color: var(--muted) !important;
      font-size: 9px !important;
    }

    .leaflet-control-attribution a { color: var(--dim) !important; }

    /* Zoom buttons */
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover { background: var(--border) !important; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .segment-item { animation: fadeUp .3s ease both; }

    /* Search box */
    #search-wrap {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    #search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      transition: border-color .2s;
    }

    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--muted); }
  </style>
</head>
<body>

<div id="shell">

  <!-- Top bar -->
  <header id="topbar">
    <div class="logo">Road<span>Health</span></div>
    <div class="pill">CHENNAI — TN</div>
    <div class="spacer"></div>
    <div id="pulse"></div>
    <div class="live-label">LIVE</div>
    <div id="time-display"></div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">

    <!-- Stats strip -->
    <div id="stats-strip">
      <div class="stat-card good">
        <div class="stat-count" id="cnt-good">0</div>
        <div class="stat-label">✅ Good</div>
      </div>
      <div class="stat-card moderate">
        <div class="stat-count" id="cnt-mod">0</div>
        <div class="stat-label">⚠ Moderate</div>
      </div>
      <div class="stat-card poor">
        <div class="stat-count" id="cnt-poor">0</div>
        <div class="stat-label">🔴 Poor</div>
      </div>
    </div>

    <!-- Score gauge -->
    <div id="score-block">
      <div id="gauge-wrap">
        <svg id="gauge-svg" width="70" height="70" viewBox="0 0 70 70">
          <circle id="gauge-track" cx="35" cy="35" r="28" />
          <circle id="gauge-fill"  cx="35" cy="35" r="28"
            stroke-dasharray="176"
            stroke-dashoffset="176"
            stroke="var(--good)" />
        </svg>
        <div id="gauge-num">—</div>
      </div>
      <div id="score-meta">
        <div class="score-title">Avg. Health Score</div>
        <div class="score-desc" id="score-desc">Calculating…</div>
      </div>
    </div>

    <!-- Search -->
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="Search segment…" autocomplete="off" />
    </div>

    <!-- Filters -->
    <div id="filter-section">
      <div class="section-title">Filter by condition</div>
      <div id="filter-btns">
        <button class="filter-btn all active" data-filter="all">All</button>
        <button class="filter-btn good"       data-filter="good">Good ≥80</button>
        <button class="filter-btn moderate"   data-filter="moderate">Moderate</button>
        <button class="filter-btn poor"       data-filter="poor">Poor &lt;50</button>
      </div>
    </div>

    <!-- Layer toggles -->
    <div id="layer-section">
      <div class="section-title">Map layers</div>
      <div class="toggle-row">
        <span class="toggle-label">Markers</span>
        <label class="toggle">
          <input type="checkbox" id="tog-markers" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Heatmap</span>
        <label class="toggle">
          <input type="checkbox" id="tog-heat" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Cluster</span>
        <label class="toggle">
          <input type="checkbox" id="tog-cluster" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Segment list -->
    <div id="list-section">
      <div class="list-header section-title">Segments</div>
      <div id="segment-list"></div>
      <div id="no-results">No matching segments</div>
    </div>

  </aside>

  <!-- Map -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-corner">
      <strong id="mc-total">0</strong> segments &nbsp;|&nbsp;
      Avg <strong id="mc-avg">—</strong> &nbsp;|&nbsp;
      Worst <strong id="mc-worst" style="color:var(--poor)">—</strong>
    </div>
  </div>

</div>

<script>
// ── Data ────────────────────────────────────────────────────────────────────
const RAW_DATA = [
  { lat:13.0827, lon:80.2707, score:90, label:"Anna Salai",    address:"Chennai, TN", detections:2  },
  { lat:13.0850, lon:80.2750, score:62, label:"T. Nagar",      address:"Chennai, TN", detections:8  },
  { lat:13.0780, lon:80.2680, score:35, label:"Saidapet",      address:"Chennai, TN", detections:21 },
  { lat:13.0900, lon:80.2800, score:78, label:"Nungambakkam",  address:"Chennai, TN", detections:5  },
  { lat:13.0760, lon:80.2600, score:20, label:"Vadapalani",    address:"Chennai, TN", detections:34 },
  { lat:13.0950, lon:80.2550, score:85, label:"Koyambedu",     address:"Chennai, TN", detections:3  },
  { lat:13.0700, lon:80.2720, score:55, label:"Ashok Nagar",   address:"Chennai, TN", detections:12 },
  { lat:13.1000, lon:80.2650, score:42, label:"Arumbakkam",    address:"Chennai, TN", detections:19 },
];

// ── Helpers ──────────────────────────────────────────────────────────────────
function getBand(s) {
  if (s >= 80) return "good";
  if (s >= 50) return "moderate";
  return "poor";
}

const COLOR = { good: "#00e5a0", moderate: "#ffb020", poor: "#ff3d5a" };

function getColor(s) { return COLOR[getBand(s)]; }

function bandLabel(b) {
  return { good: "Good", moderate: "Moderate", poor: "Poor" }[b];
}

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map("map", {
  center: [13.0827, 80.2707],
  zoom: 14,
  zoomControl: true,
  preferCanvas: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://carto.com">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// ── Layers ───────────────────────────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({ showCoverageOnHover: false, maxClusterRadius: 50 });
const plainGroup   = L.featureGroup();
let   heatLayer    = null;

let useCluster = true;

// ── Build popup HTML ─────────────────────────────────────────────────────────
function makePopup(d) {
  const color = getColor(d.score);
  const band  = getBand(d.score);
  return `
  <div class="popup-card">
    <div class="popup-header">
      <div class="popup-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
      <div class="popup-name">${d.label}</div>
    </div>
    <div class="popup-row">
      <span class="key">ADDRESS</span>
      <span class="val">${d.address}</span>
    </div>
    <div class="popup-row">
      <span class="key">CONDITION</span>
      <span class="val" style="color:${color}">${bandLabel(band).toUpperCase()}</span>
    </div>
    <div class="popup-row">
      <span class="key">DETECTIONS</span>
      <span class="val">${d.detections} faults</span>
    </div>
    <div class="popup-row">
      <span class="key">COORDS</span>
      <span class="val" style="font-size:9px">${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}</span>
    </div>
    <div class="score-bar-wrap">
      <div class="popup-row" style="margin-bottom:4px">
        <span class="key">HEALTH SCORE</span>
        <span class="val" style="color:${color};font-size:16px">${d.score}<span style="font-size:10px;color:var(--dim)">/100</span></span>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${d.score}%;background:${color}"></div>
      </div>
    </div>
  </div>`;
}

// ── Build circle markers ──────────────────────────────────────────────────────
const markerMap = {}; // index → marker

function buildRadius(s) {
  if (s >= 80) return 8;
  if (s >= 50) return 11;
  return 15;
}

RAW_DATA.forEach((d, i) => {
  const color = getColor(d.score);
  const marker = L.circleMarker([d.lat, d.lon], {
    radius: buildRadius(d.score),
    color:       color,
    weight:      2,
    fillColor:   color,
    fillOpacity: 0.75,
  }).bindPopup(makePopup(d), { maxWidth: 260 })
    .bindTooltip(`<b>${d.label}</b> — ${d.score}/100`, { sticky: false });

  marker.on("click", () => selectSegment(i));
  markerMap[i] = marker;
});

// Add all markers to cluster by default
function rebuildMarkerLayer() {
  clusterGroup.clearLayers();
  plainGroup.clearLayers();

  Object.values(markerMap).forEach(m => {
    if (m._visible === false) return;
    if (useCluster) clusterGroup.addLayer(m);
    else            plainGroup.addLayer(m);
  });

  if (useCluster) {
    if (!map.hasLayer(clusterGroup)) clusterGroup.addTo(map);
    if (map.hasLayer(plainGroup))   map.removeLayer(plainGroup);
  } else {
    if (!map.hasLayer(plainGroup))  plainGroup.addTo(map);
    if (map.hasLayer(clusterGroup)) map.removeLayer(clusterGroup);
  }
}

rebuildMarkerLayer();

// ── Heatmap ──────────────────────────────────────────────────────────────────
function buildHeatmap(data) {
  if (heatLayer) map.removeLayer(heatLayer);
  const points = data.map(d => [d.lat, d.lon, (100 - d.score) / 100]);
  heatLayer = L.heatLayer(points, {
    radius: 30,
    blur: 20,
    minOpacity: 0.25,
    gradient: { 0.3: "#00e5a0", 0.6: "#ffb020", 1.0: "#ff3d5a" },
  }).addTo(map);
}

buildHeatmap(RAW_DATA);

// ── Stats & Gauge ─────────────────────────────────────────────────────────────
function updateStats(data) {
  const good = data.filter(d => getBand(d.score) === "good").length;
  const mod  = data.filter(d => getBand(d.score) === "moderate").length;
  const poor = data.filter(d => getBand(d.score) === "poor").length;
  const avg  = data.length ? data.reduce((a, d) => a + d.score, 0) / data.length : 0;

  document.getElementById("cnt-good").textContent = good;
  document.getElementById("cnt-mod").textContent  = mod;
  document.getElementById("cnt-poor").textContent = poor;

  // Gauge
  const r = 28, circ = 2 * Math.PI * r;
  const fill = document.getElementById("gauge-fill");
  const offset = circ - (avg / 100) * circ;
  fill.style.strokeDashoffset = offset;
  fill.style.stroke = getColor(avg);

  document.getElementById("gauge-num").textContent = Math.round(avg);
  document.getElementById("gauge-num").style.color = getColor(avg);

  const band = getBand(avg);
  const descs = {
    good:     "Roads are in <b style='color:var(--good)'>good condition</b>.",
    moderate: "Some sections need <b style='color:var(--moderate)'>attention</b>.",
    poor:     "Critical damage — <b style='color:var(--poor)'>urgent repair</b> needed.",
  };
  document.getElementById("score-desc").innerHTML = descs[band];

  // Map corner
  const worst = data.length ? Math.min(...data.map(d => d.score)) : "—";
  document.getElementById("mc-total").textContent = data.length;
  document.getElementById("mc-avg").textContent   = Math.round(avg);
  document.getElementById("mc-worst").textContent = worst;
}

// ── Segment list ──────────────────────────────────────────────────────────────
let activeIdx = null;

function buildList(data) {
  const list = document.getElementById("segment-list");
  const noRes = document.getElementById("no-results");

  if (data.length === 0) {
    list.innerHTML = "";
    noRes.style.display = "block";
    return;
  }

  noRes.style.display = "none";

  const sorted = [...data].sort((a, b) => a.score - b.score);

  list.innerHTML = sorted.map((d, i) => {
    const color = getColor(d.score);
    const origIdx = RAW_DATA.indexOf(d);
    return `
    <div class="segment-item ${activeIdx === origIdx ? 'active' : ''}"
         data-idx="${origIdx}"
         style="animation-delay:${i * 30}ms">
      <div class="seg-dot" style="background:${color};box-shadow:0 0 5px ${color}"></div>
      <div class="seg-info">
        <div class="seg-name">${d.label}</div>
        <div class="seg-addr">${d.address} · ${d.detections} faults</div>
      </div>
      <div class="seg-score" style="color:${color}">${d.score}</div>
    </div>`;
  }).join("");

  list.querySelectorAll(".segment-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx);
      selectSegment(idx);
    });
  });
}

function selectSegment(idx) {
  activeIdx = idx;
  const d = RAW_DATA[idx];
  const marker = markerMap[idx];

  map.flyTo([d.lat, d.lon], 16, { duration: 0.8 });
  setTimeout(() => marker.openPopup(), 850);

  // Highlight list
  document.querySelectorAll(".segment-item").forEach(el => {
    el.classList.toggle("active", parseInt(el.dataset.idx) === idx);
  });
}

// ── Filtering ──────────────────────────────────────────────────────────────────
let activeFilter  = "all";
let searchQuery   = "";

function applyFilters() {
  const filtered = RAW_DATA.filter(d => {
    const bandMatch  = activeFilter === "all" || getBand(d.score) === activeFilter;
    const labelMatch = d.label.toLowerCase().includes(searchQuery);
    return bandMatch && labelMatch;
  });

  // Show/hide markers
  RAW_DATA.forEach((d, i) => {
    markerMap[i]._visible = filtered.includes(d);
  });

  rebuildMarkerLayer();
  updateStats(filtered);
  buildList(filtered);
  buildHeatmap(filtered);
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

// Search
document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase().trim();
  applyFilters();
});

// ── Layer toggles ──────────────────────────────────────────────────────────────
document.getElementById("tog-markers").addEventListener("change", e => {
  if (e.target.checked) {
    rebuildMarkerLayer();
  } else {
    map.removeLayer(clusterGroup);
    map.removeLayer(plainGroup);
  }
});

document.getElementById("tog-heat").addEventListener("change", e => {
  if (e.target.checked) {
    buildHeatmap(RAW_DATA);
  } else if (heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
  }
});

document.getElementById("tog-cluster").addEventListener("change", e => {
  useCluster = e.target.checked;
  if (document.getElementById("tog-markers").checked) {
    rebuildMarkerLayer();
  }
});

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("time-display").textContent =
    now.toLocaleTimeString("en-IN", { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

// ── Init ───────────────────────────────────────────────────────────────────────
updateStats(RAW_DATA);
buildList(RAW_DATA);

</script>
</body>
</html>
